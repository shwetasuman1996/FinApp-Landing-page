services:
  # Backend API (Express + MongoDB)
  - type: web
    name: finapp-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://finapp.in.net
      - key: ENQUIRY_TO
        value: finappacademy@gmail.com
      - key: SMTP_SERVICE
        value: gmail
      - key: SMTP_FROM
        value: FinApp Website <finappacademy@gmail.com>
      # --- Secrets — fill in via the Render dashboard ---
      - key: MONGODB_URI
        sync: false
      - key: SMTP_USER
        sync: false   # finappacademy@gmail.com
      - key: SMTP_PASS
        sync: false   # Gmail App Password (Google Account → Security → App passwords)

  # Frontend (React/Vite — Static Site)
  - type: web
    name: finapp-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    branch: main
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your finapp-api Render URL, e.g. https://finapp-api.onrender.com
