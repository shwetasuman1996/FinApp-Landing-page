services:
  # Backend API (Express + MongoDB)
  - type: web
    name: finapp-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false   # Set this in the Render dashboard

  # Frontend (React/Vite — Static Site)
  - type: web
    name: finapp-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    branch: main
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your finapp-api Render URL, e.g. https://finapp-api.onrender.com
