<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinApp — Professional Finance & Accounting Education Platform</title>
    <meta name="description" content="FinApp is a structured LMS for finance professionals. Master Tally Prime, Excel, and AI for Finance with 100+ lessons, live quiz contests, and progress tracking." />
  </head>
  <body>
    <div id="root"></div>

    <!--
      Hidden static form so Netlify's build-time bot detects the form
      schema (the React form below posts to "/" with the same fields).
      Do not remove. https://docs.netlify.com/forms/setup/
    -->
    <form name="enquiry" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="course" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
